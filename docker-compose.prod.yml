services:
  new-api:
    build:
      context: .
      dockerfile: Dockerfile.prod
    env_file:
      - prod.env
    environment:
      PORT: 3000
      TZ: Asia/Shanghai
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
    command: --log-dir /app/logs
    restart: always
    volumes:
      - ./data:/data
      - ./logs/app:/app/logs
    expose:
      - "3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - new-api-prod

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - new-api
    restart: always
    environment:
      HTTP_PROXY: ""
      HTTPS_PROXY: ""
      ALL_PROXY: ""
      http_proxy: ""
      https_proxy: ""
      all_proxy: ""
    ports:
      - "127.0.0.1:${PORT:-10011}:80"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    tmpfs:
      - /tmp/nginx:size=256m,mode=700
    networks:
      - new-api-prod
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/health | grep -q '\"success\":true'"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  new-api-prod:
    driver: bridge
